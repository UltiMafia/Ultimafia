services:
  # nginx service
  nginx:
    depends_on:
      - backend
    container_name: "nginx"
    restart: unless-stopped
    build:
      context: react_main
      dockerfile: dockerfile
      target: production
    expose:
      - 80
      - 443
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./react_main/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/uploads
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    env_file: ./react_main/.env
    networks:
      - my_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  certbot:
    image: certbot/certbot
    container_name: "certbot"
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Prunes dangling docker images every 24 hours to prevent disk buildup
  docker-pruner:
    image: docker:cli
    container_name: "docker-pruner"
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: "/bin/sh -c 'docker image prune -f'"
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"
